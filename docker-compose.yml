services:
  web:
    container_name: trip-web
    build: .
    restart: unless-stopped
    command: python src/manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
        db:
          condition: service_healthy
        redis:
          condition: service_healthy

  db:
    container_name: trip-db
    image: postgres:17.5
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: TajneHaslo456#@!
      POSTGRES_USER: tripsync_user
      POSTGRES_DB: tripsync_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U tripsync_user -d tripsync_db" ]
      interval: 5s
      timeout: 3s
      retries: 5
  redis:
    image: redis:8.6.2-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
  celery_worker:
    build: .
    command: celery -A core worker --loglevel=info
    volumes:
      - .:/app
    environment:
      - DJANGO_SETTINGS_MODULE=core.settings
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - PYTHONPATH=/app/src
    depends_on:
      redis:
        condition: service_healthy
  flower:
    build: .
    command: celery -A core flower --port=5555
    volumes:
      - .:/app
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - PYTHONPATH=/app/src
    depends_on:
      redis:
        condition: service_healthy


volumes:
    postgres_data:




